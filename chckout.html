<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chewiwi | Checkout</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar mb-4 shadow-sm bg-white">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fw-bold text-danger" href="index.html">CHEWIWI</a>
            <a href="products.html" class="btn btn-sm btn-outline-secondary">← Back to Shop</a>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row">
            <!-- LEFT: FORM -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm p-4 mb-4" style="border-radius: 15px;">
                    <form id="checkout-form">
                        <h4 class="mb-3">Customer Information</h4>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="cust-name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="cust-phone" required>
                            </div>
                        </div>

                        <h4 class="mt-4 mb-3">Shipping Details</h4>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Country</label>
                                <input type="text" class="form-control bg-light" value="Philippines" readonly>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Province</label>
                                <select id="province-dropdown" class="form-select" required>
                                    <option value="" selected disabled>Loading provinces...</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">City / Municipality</label>
                                <select id="city-dropdown" class="form-select" required disabled>
                                    <option value="" selected disabled>Select province first</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-9 mb-3">
                                <label class="form-label">House No., Street, Brgy</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">ZIP Code</label>
                                <input type="text" class="form-control" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-danger w-100 py-3 mt-3 fw-bold">PLACE ORDER</button>
                    </form>
                </div>
            </div>

            <!-- RIGHT: SUMMARY -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm p-4 sticky-top" style="top: 20px; border-radius: 15px;">
                    <h4>Order Summary</h4>
                    <hr>
                    <div id="summary-items"></div>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal</span>
                        <span id="subtotal-val">₱0</span>
                    </div>
                    <div class="d-flex justify-content-between h5 fw-bold">
                        <span>Total</span>
                        <span id="final-total" class="text-danger">₱0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- YOUR SEPARATED JS FILE -->
    <script src="chckout.js"></script>
</body>
</html>
